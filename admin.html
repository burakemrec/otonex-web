<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli | Otonex</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <div id="loginScreen" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-slate-800">
            <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">Otonex Yetkili</h1>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="username" placeholder="Kullanıcı Adı" class="w-full p-4 bg-gray-50 border rounded-xl" required>
                <input type="password" id="password" placeholder="Şifre" class="w-full p-4 bg-gray-50 border rounded-xl" required>
                <button type="submit" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">Giriş Yap</button>
            </form>
        </div>
    </div>

    <div id="adminPanel" class="hidden flex-col min-h-screen">
        <nav class="bg-slate-800 text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold">🛠 Otonex Admin Paneli</h1>
                <div class="space-x-4">
                    <button onclick="sekmeDegistir('talepler')" class="hover:text-blue-300 font-semibold">📥 Gelen Talepler</button>
                    <button onclick="sekmeDegistir('ilanlar')" class="hover:text-green-300 font-semibold">🚗 Satılık İlanlarım</button>
                    <button onclick="location.reload()" class="text-red-300 ml-4">Çıkış</button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto mt-8 p-4 flex-grow w-full max-w-7xl">
            
            <div id="sekme-talepler" class="block">
                <h2 class="text-2xl font-bold mb-4">Müşteri Satış Talepleri</h2>
                <div class="bg-white shadow-xl rounded-lg overflow-x-auto border">
                    <table class="min-w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 font-semibold text-gray-600 w-1/4">Müşteri</th>
                                <th class="p-4 font-semibold text-gray-600 w-1/3">Araç Bilgisi & Donanım</th>
                                <th class="p-4 font-semibold text-gray-600 w-1/4">Hasar & Tramer</th>
                                <th class="p-4 font-semibold text-gray-600">İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="talepTablosu" class="text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div id="sekme-ilanlar" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-lg shadow-xl border">
                        <h3 class="font-bold text-lg mb-4 text-green-700">Yeni İlan Ekle</h3>
                        <form id="ilanFormu" class="space-y-3">
                            <input type="text" id="ilan_marka" placeholder="Marka (Örn: BMW)" class="w-full p-2 border rounded" required>
                            <input type="text" id="ilan_model" placeholder="Model (Örn: 320i)" class="w-full p-2 border rounded" required>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="ilan_yil" placeholder="Yıl" class="w-full p-2 border rounded" required>
                                <input type="number" id="ilan_km" placeholder="Kilometre" class="w-full p-2 border rounded" required>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <select id="ilan_yakit" class="w-full p-2 border rounded" required>
                                    <option value="">Yakıt</option>
                                    <option value="Benzin">Benzin</option>
                                    <option value="Dizel">Dizel</option>
                                    <option value="LPG & Benzin">LPG & Benzin</option>
                                    <option value="Hibrit / Elektrik">Hibrit / Elektrik</option>
                                </select>
                                <select id="ilan_sanziman" class="w-full p-2 border rounded" required>
                                    <option value="">Şanzıman</option>
                                    <option value="Otomatik">Otomatik</option>
                                    <option value="Yarı Otomatik">Yarı Otomatik</option>
                                    <option value="Manuel">Manuel</option>
                                </select>
                            </div>
                            
                            <input type="text" id="ilan_motor" placeholder="Motor Gücü / Hacmi (Örn: 1.5 dCi 110 HP)" class="w-full p-2 border rounded" required>
                            <input type="text" id="ilan_donanim" placeholder="Donanım (Örn: Cam Tavan, AMG)" class="w-full p-2 border rounded" required>
                            <input type="text" id="ilan_hasar" placeholder="Hasar Durumu (Örn: Hatasız, 1 Parça Boya)" class="w-full p-2 border rounded" required>
                            <input type="text" id="ilan_fiyat" placeholder="Fiyat (Örn: 1.500.000 TL)" class="w-full p-2 border rounded" required>
                            <input type="text" id="ilan_resim" placeholder="Resim URL Linki (Şimdilik)" class="w-full p-2 border rounded" required>
                            
                            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 rounded mt-2">İlanı Yayınla</button>
                        </form>
                    </div>
                    
                    <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-xl border">
                        <h3 class="font-bold text-lg mb-4">Yayındaki Araçlarım</h3>
                        <div id="ilanListesi" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="talepModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl relative">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <h2 class="text-xl font-bold text-slate-800">Sipariş / Araç Detayları</h2>
                <button onclick="talepModalKapat()" class="text-gray-400 hover:text-red-500 font-bold text-lg px-2">X</button>
            </div>
            
            <div id="talepModalIcerik" class="p-6">
                </div>
            
            <div class="p-6 bg-gray-50 border-t border-gray-100 flex flex-col sm:flex-row gap-4 justify-end rounded-b-2xl">
                <button id="btnSil" class="bg-red-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-600 transition shadow-sm w-full sm:w-auto">Çöpe At (Sil)</button>
                <button id="btnIncelendi" class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 transition shadow-sm w-full sm:w-auto">İncelendi Olarak İşaretle</button>
            </div>
        </div>
    </div>

    <script>
        // Giriş
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(document.getElementById('username').value === "admin" && document.getElementById('password').value === "123456") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('flex');
                verileriGetir();
            } else {
                alert("Hatalı giriş!");
            }
        });

        // Sekme Geçişi
        function sekmeDegistir(sekmeAdi) {
            document.getElementById('sekme-talepler').classList.add('hidden');
            document.getElementById('sekme-ilanlar').classList.add('hidden');
            document.getElementById('sekme-' + sekmeAdi).classList.remove('hidden');
        }

        // Verileri Çek
        function verileriGetir() { talepleriGetir(); ilanlariGetir(); }

        let globalTalepler = []; 

        async function talepleriGetir() {
            try {
                const res = await fetch('/api/talepler'); 
                let talepler = await res.json();
                
                globalTalepler = talepler;

                document.getElementById('talepTablosu').innerHTML = talepler.map(t => `
                    <tr class="border-b transition duration-200 ${t.durum === 'İncelendi' ? 'bg-green-50/50 hover:bg-green-50' : 'hover:bg-gray-50'}">
                        <td class="p-4 align-top">
                            <span class="font-bold text-gray-800">${t.ad_soyad || 'Belirtilmemiş'}</span><br>
                            <span class="text-sm font-medium text-blue-600">${t.telefon || ''}</span>
                        </td>
                        <td class="p-4 align-top">
                            <span class="font-bold text-base block">${t.yil} ${t.marka} ${t.model}</span>
                            <span class="text-xs text-gray-500 block mt-1">${t.yakit || '-'} | ${t.sanziman || '-'} | ${t.motor || '-'} | ${t.renk || '-'}</span>
                            <span class="text-sm font-medium text-gray-700 block mt-1">${Number(t.kilometre).toLocaleString('tr-TR')} KM</span>
                        </td>
                        <td class="p-4 align-top">
                            <span class="text-sm font-bold text-red-600 line-clamp-2" title="${t.hasar_durumu}">${t.hasar_durumu || 'Belirtilmemiş'}</span>
                            <span class="text-xs font-semibold text-gray-500 block mt-1">Tramer: ${t.tramer ? t.tramer + ' ₺' : 'Yok'}</span>
                            
                            <div class="mt-3">
                                ${t.durum === 'İncelendi' 
                                    ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold border border-green-200">✅ İncelendi</span>' 
                                    : '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold border border-yellow-200">⏳ Bekliyor</span>'}
                            </div>
                        </td>
                        <td class="p-4 align-middle">
                            <button onclick="talepIncele(${t.id})" class="w-full ${t.durum === 'İncelendi' ? 'bg-green-600 hover:bg-green-700' : 'bg-slate-800 hover:bg-slate-700'} text-white px-4 py-3 rounded-xl transition font-bold text-sm shadow-sm">
                                ${t.durum === 'İncelendi' ? 'İncelendi (Detay)' : 'İncele'}
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Talepler çekilemedi", error);
            }
        }

        // İncele Butonu Fonksiyonu
        function talepIncele(id) {
            const t = globalTalepler.find(x => x.id === id);
            if(!t) return;

            document.getElementById('talepModalIcerik').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Müşteri İletişim</p>
                        <p class="font-bold text-lg text-slate-800">${t.ad_soyad || 'Belirtilmemiş'}</p>
                        <p class="text-blue-600 font-semibold text-base mt-1"><a href="tel:${t.telefon}">${t.telefon || 'Belirtilmemiş'}</a></p>
                    </div>
                    
                    <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Temel Araç Bilgisi</p>
                        <p class="font-bold text-lg text-slate-800">${t.marka} ${t.model}</p>
                        <p class="text-gray-600 font-medium text-sm mt-1">${t.yil} Model &nbsp;|&nbsp; ${Number(t.kilometre).toLocaleString('tr-TR')} KM</p>
                    </div>

                    <div class="md:col-span-2 bg-blue-50 border border-blue-100 p-5 rounded-xl">
                        <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-3">Teknik Detaylar & Donanım</p>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-y-4 gap-x-2 text-sm">
                            <div><span class="block text-gray-500 text-xs">Yakıt</span><span class="font-bold text-gray-800">${t.yakit || '-'}</span></div>
                            <div><span class="block text-gray-500 text-xs">Şanzıman</span><span class="font-bold text-gray-800">${t.sanziman || '-'}</span></div>
                            <div><span class="block text-gray-500 text-xs">Motor</span><span class="font-bold text-gray-800">${t.motor || '-'}</span></div>
                            <div><span class="block text-gray-500 text-xs">Renk</span><span class="font-bold text-gray-800">${t.renk || '-'}</span></div>
                            <div class="col-span-2"><span class="block text-gray-500 text-xs">Sunroof / Cam Tavan</span><span class="font-bold text-gray-800">${t.sunroof || '-'}</span></div>
                            <div class="col-span-2"><span class="block text-gray-500 text-xs">Donanım Paketi / Özellikler</span><span class="font-bold text-gray-800 leading-relaxed">${t.donanim || '-'}</span></div>
                        </div>
                    </div>

                    <div class="md:col-span-2 bg-red-50 border border-red-100 p-5 rounded-xl">
                        <p class="text-xs font-bold text-red-500 uppercase tracking-wider mb-3">Ekspertiz & Tramer Durumu</p>
                        <div class="space-y-3 text-sm">
                            <div><span class="block text-gray-500 text-xs">Değişen / Boya Durumu</span><span class="font-bold text-red-700 leading-relaxed">${t.hasar_durumu || 'Belirtilmemiş'}</span></div>
                            <div><span class="block text-gray-500 text-xs">Tramer Tutarı</span><span class="font-bold text-gray-800">${t.tramer ? t.tramer + ' ₺' : 'Belirtilmemiş'}</span></div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('btnSil').onclick = () => talepSil(t.id);
            document.getElementById('btnIncelendi').onclick = () => talepIncelendi(t.id);

            document.getElementById('talepModal').classList.remove('hidden');
        }

        function talepModalKapat() {
            document.getElementById('talepModal').classList.add('hidden');
        }

        async function talepSil(id) {
            if(!confirm("Bu siparişi / talebi kalıcı olarak silmek istediğinize emin misiniz?")) return;
            try {
                await fetch('/api/talep-sil/' + id, { method: 'DELETE' });
                talepModalKapat(); 
                talepleriGetir(); 
            } catch(err) { alert("Silinirken hata oluştu."); }
        }

        async function talepIncelendi(id) {
            try {
                await fetch('/api/talep-durum/' + id, { 
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ durum: 'İncelendi' })
                });
                talepModalKapat(); 
                talepleriGetir(); 
            } catch(err) { alert("Güncellenirken hata oluştu."); }
        }

        // İlanlar (Stok)
        async function ilanlariGetir() {
            try {
                const res = await fetch('/api/ilanlar'); 
                const ilanlar = await res.json();
                document.getElementById('ilanListesi').innerHTML = ilanlar.map(i => `
                    <div class="border rounded-lg p-4 flex flex-col items-center bg-gray-50 relative">
                        <img src="${i.resim_url || 'https://via.placeholder.com/300x200'}" alt="Araba" class="h-32 object-cover rounded mb-3 w-full border">
                        <h4 class="font-bold text-lg text-center leading-tight">${i.marka} ${i.model}</h4>
                        <p class="text-sm text-gray-600 mt-1">${i.yil} | ${Number(i.kilometre).toLocaleString('tr-TR')} KM</p>
                        <p class="font-bold text-green-600 text-xl mt-2">${i.fiyat}</p>
                        <button onclick="ilanSil(${i.id})" class="mt-4 text-red-500 text-xs font-bold border border-red-500 w-full py-2 rounded hover:bg-red-500 hover:text-white transition">İlanı Yayından Kaldır</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error("İlanlar çekilemedi", error);
            }
        }
        
        document.getElementById('ilanFormu').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerText = "Ekleniyor..."; btn.disabled = true;

            const veri = { 
                marka: document.getElementById('ilan_marka').value, 
                model: document.getElementById('ilan_model').value, 
                yil: document.getElementById('ilan_yil').value, 
                kilometre: document.getElementById('ilan_km').value, 
                fiyat: document.getElementById('ilan_fiyat').value, 
                resim_url: document.getElementById('ilan_resim').value,
                yakit: document.getElementById('ilan_yakit').value,
                sanziman: document.getElementById('ilan_sanziman').value,
                motor: document.getElementById('ilan_motor').value, // EKLENEN KISIM BURASI
                donanim: document.getElementById('ilan_donanim').value,
                hasar_durumu: document.getElementById('ilan_hasar').value
            };

            await fetch('/api/ilan-ekle', { 
                method: 'POST', 
                headers:{'Content-Type':'application/json'}, 
                body: JSON.stringify(veri) 
            });
            
            this.reset(); 
            btn.innerText = "İlanı Yayınla"; btn.disabled = false;
            ilanlariGetir();
        });

        async function ilanSil(id) {
            if(confirm("İlanı silmek istediğinize emin misiniz?")) {
                await fetch('/api/ilan-sil/' + id, { method: 'DELETE' });
                ilanlariGetir();
            }
        }
    </script>
</body>
</html>
